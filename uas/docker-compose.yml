services:
  # =====================
  # MongoDB
  # =====================
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================
  # Elasticsearch
  # =====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # =====================
  # Core Service (FastAPI + MongoDB)
  # =====================
  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: core-service
    restart: unless-stopped
    ports:
      - "${CORE_SERVICE_PORT:-8001}:8001"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB_NAME=toko_komputer
      - MONGO_COLLECTION_NAME=produk
      - SEARCH_SERVICE_URL=http://search-service:8002
      - HOST=0.0.0.0
      - PORT=8001
      - DATASET_PATH=/app/data/products.json
    volumes:
      - ./data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network

  # =====================
  # Search Service (FastAPI + Elasticsearch)
  # =====================
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: search-service
    restart: unless-stopped
    ports:
      - "${SEARCH_SERVICE_PORT:-8002}:8002"
    environment:
      - ELASTIC_HOST=elasticsearch
      - ELASTIC_PORT=9200
      - ELASTIC_INDEX_NAME=produk
      - HOST=0.0.0.0
      - PORT=8002
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - app-network

  # =====================
  # Frontend (Vue.js)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_CORE_SERVICE_URL=http://localhost:8001/api
      - VITE_SEARCH_SERVICE_URL=http://localhost:8002/api
    depends_on:
      - core-service
      - search-service
    networks:
      - app-network

volumes:
  mongodb_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  app-network:
    driver: bridge